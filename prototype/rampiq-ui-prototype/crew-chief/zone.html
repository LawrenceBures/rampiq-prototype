<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RampIQ · Crew Chief · Zone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .chief-head {
    height: 56px; padding: 0 22px; flex-shrink: 0;
    display: flex; align-items: center; gap: 24px;
    background: #04060a;
    border-bottom: 1px solid var(--line);
  }
  .chief-zone { font-size: 16px; font-weight: 700; }
  .chief-zone .sub { font-family: var(--mono); font-size: 11px; color: var(--text-2); font-weight: 400; margin-left: 8px; }
  .chief-stats { display: flex; gap: 18px; margin-left: auto; }
  .chief-stat { text-align: center; padding: 0 6px; }
  .chief-stat .v { font-family: var(--mono); font-size: 18px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .chief-stat .l { font-family: var(--mono); font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .chief-stat.warn .v { color: var(--amber); }
  .chief-stat.crit .v { color: var(--red); }

  .chief-gates {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    padding: 20px;
  }
  .chief-gate {
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    min-height: 160px;
    display: flex; flex-direction: column;
  }
  .chief-gate:hover { border-color: var(--line-3); }
  .chief-gate.warn { border-color: rgba(232,161,58,0.5); background: linear-gradient(180deg, var(--amber-bg), var(--bg-1)); }
  .chief-gate.crit { border-color: rgba(229,72,77,0.6); background: linear-gradient(180deg, var(--red-bg), var(--bg-1)); animation: critFlash 3s infinite; }
  .chief-gate.recovery { border-color: rgba(74,154,239,0.5); background: linear-gradient(180deg, var(--blue-bg), var(--bg-1)); }
  .cg-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .cg-id { font-family: var(--mono); font-size: 16px; font-weight: 700; }
  .cg-time { font-family: var(--mono); font-size: 13px; color: var(--text-2); font-variant-numeric: tabular-nums; font-weight: 600; }
  .cg-time.warn { color: var(--amber); }
  .cg-time.crit { color: var(--red); }
  .cg-tail { font-family: var(--mono); font-size: 12px; color: var(--text-1); margin-bottom: 2px; }
  .cg-flight { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-bottom: 10px; }
  .cg-step { margin-top: auto; font-size: 11px; color: var(--text-2); padding-top: 8px; border-top: 1px solid var(--line); }
  .cg-step .label { font-family: var(--mono); font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .cg-step .now { color: var(--text-0); margin-top: 3px; font-weight: 500; font-size: 12px; }
  .cg-crew { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .crew-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg-4); border: 1px solid var(--line-3);
    font-family: var(--mono); font-size: 8px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-1);
  }
  .crew-dot.active { background: var(--green-d); border-color: var(--green); color: var(--green); }
  .cg-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--red); color: white;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 8px;
    border: 2px solid var(--bg-0);
  }
</style>
</head>
<body>
<div class="app">
    <nav class="role-nav">
    <a href="zone.html" class="active"><span class="ic">▣</span>Zone</a>
    <a href="queue.html"><span class="ic">↦</span>Queue</a>
    <a href="recovery.html"><span class="ic">↻</span>Recov</a>
    <a href="../replay/replay.html"><span class="ic">▶</span>Replay</a>
  </nav>
  <div class="main">
    <div class="chief-head">
      <div class="chief-zone">Zone B · Central <span class="sub">CHIEF KENWORTH · PM SHIFT</span></div>
      <div class="chief-stats">
        <div class="chief-stat"><div class="v">9</div><div class="l">Turns</div></div>
        <div class="chief-stat warn"><div class="v">4</div><div class="l">Sup</div></div>
        <div class="chief-stat crit"><div class="v">1</div><div class="l">Incid</div></div>
        <div class="chief-stat"><div class="v">12</div><div class="l">On-Pos</div></div>
        <div class="chief-stat warn"><div class="v">82</div><div class="l">Pressure</div></div>
      </div>
    </div>

    <div class="body">
      <div class="chief-gates" id="chiefGates"></div>
    </div>
  </div>
</div>

<script src="../shared/mock-data.js"></script>
<script src="../shared/events.js"></script>
<script src="../shared/interactions.js"></script>
<script>
RampIQ.ui.init('chief');
const data = RampIQ.data.state;

const zoneGates = data.gates.filter(g => g.zone === 'B' && g.state !== 'empty');

function timeBadge(dep) {
  // mock: derive minutes from departure label vs 14:23
  const [h, m] = dep.split(':').map(Number);
  const nowMin = 14*60 + 23;
  const depMin = h*60 + m;
  const diff = depMin - nowMin;
  if (diff < 0) return { txt: `${Math.abs(diff)}m late`, cls: 'crit' };
  if (diff < 10) return { txt: `−${diff}m`, cls: 'crit' };
  if (diff < 20) return { txt: `${diff}m`, cls: 'warn' };
  return { txt: `${diff}m`, cls: '' };
}

function renderGates() {
  document.getElementById('chiefGates').innerHTML = zoneGates.map(g => {
    const t = timeBadge(g.dep);
    const badges = g.state === 'crit' ? 3 : g.state === 'warn' ? 1 : 0;
    const crewSet = ['MA','RT','LY','SH','TK','JM','PS','HB','GZ','YN','UV','BN'];
    const crew = Array.from({length: g.crew}, (_, i) => crewSet[i % crewSet.length]);
    return `
      <div class="chief-gate ${g.state === 'crit' ? 'crit' : g.state === 'warn' ? 'warn' : g.state === 'recovery' ? 'recovery' : ''}" onclick="openGate('${g.id}')">
        <div class="cg-head"><div class="cg-id">${g.id}</div><div class="cg-time ${t.cls}">${t.txt}</div></div>
        <div class="cg-tail">${g.tail}</div>
        <div class="cg-flight">${g.flight}</div>
        <div class="cg-crew">
          ${crew.map(c => `<div class="crew-dot active">${c}</div>`).join('')}
          ${g.crew < 3 ? `<div class="crew-dot">—</div>` : ''}
        </div>
        <div class="cg-step">
          <div class="label">${g.state === 'crit' ? 'Incident' : g.state === 'recovery' ? 'Recovery' : 'Current Step'}</div>
          <div class="now">${g.step}</div>
        </div>
        ${badges > 0 ? `<div class="cg-badge">${badges}</div>` : ''}
      </div>
    `;
  }).join('');
}

function openGate(id) {
  const g = data.gates.find(x => x.id === id);
  if (g && g.incidentId) {
    location.href = 'recovery.html?inc=' + g.incidentId;
  } else {
    RampIQ.ui.showToast(`Gate ${id} · ${g.step}`);
  }
}
window.openGate = openGate;

renderGates();
</script>
</body>
</html>
